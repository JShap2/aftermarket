<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nyt.obituaries — feed</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="terminal">
      <!-- Top status bar -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-name">nyt.obituaries</span>
          <span class="brand-sub">/ feed</span>
        </div>
        <div class="topbar-fields">
          <div class="field">
            <span class="field-label">FEED</span>
            <span class="field-val" id="feed-name">NYT / OBITS</span>
          </div>
          <div class="field">
            <span class="field-label">INDEX·AVG AGE</span>
            <span class="field-val accent" id="index-val">—</span>
          </div>
          <div class="field">
            <span class="field-label">LISTINGS</span>
            <span class="field-val" id="count-val">—</span>
          </div>
          <div class="field">
            <span class="field-label">SRC</span>
            <span class="field-val" id="source-pill">…</span>
          </div>
          <div class="field">
            <span class="field-label">UTC</span>
            <span class="field-val" id="clock">--:--:--</span>
          </div>
        </div>
      </header>

      <!-- Primary element: the ticker wall (multiple scrolling lanes) -->
      <section class="ticker-wall" id="ticker-wall" aria-label="ticker">
        <div class="ticker-empty" id="ticker-empty">LOADING FEED…</div>
      </section>

      <!-- Secondary, compact: register + detail -->
      <main class="grid">
        <section class="board" aria-label="obituary register">
          <div class="board-head">
            <div class="col-sym">SYM</div>
            <div class="col-name">DECEDENT</div>
            <div class="col-cat">SECTOR</div>
            <div class="col-num">LAST</div>
            <div class="col-num">CHG</div>
            <div class="col-num">%CHG</div>
            <div class="col-time">TAPE</div>
          </div>
          <div class="board-body" id="board-body">
            <div class="board-empty" id="board-empty">LOADING FEED…</div>
          </div>
        </section>

        <aside class="detail" id="detail">
          <div class="detail-head">RECORD</div>
          <div class="detail-body" id="detail-body">
            <div class="detail-hint">
              SELECT A RECORD TO INSPECT. ↑/↓ NAVIGATE · ENTER OPENS SOURCE
            </div>
          </div>
        </aside>
      </main>

      <!-- Command line -->
      <footer class="cmdbar">
        <span class="cmd-prompt">CMD&gt;</span>
        <input
          id="cmd"
          class="cmd-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="type to filter — or HELP, REFRESH, SORT AGE, LIVE…"
        />
        <span class="cmd-status" id="cmd-status"></span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
