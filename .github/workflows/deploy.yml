name: Deploy AFTERMARKET to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run manually from the GitHub mobile/web UI
  schedule:
    - cron: "17 * * * *" # refresh the baked-in obit data hourly

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't pile up scheduled runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bake feed data into the static site
        run: node scripts/build-static.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
