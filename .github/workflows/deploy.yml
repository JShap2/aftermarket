name: Deploy AFTERMARKET to Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run manually from the GitHub mobile/web UI
  schedule:
    - cron: "17 * * * *" # refresh the baked-in obit data hourly

permissions:
  contents: write # to commit the persisted memory file back to the repo
  pages: write
  id-token: write

# Allow one concurrent deploy; don't pile up scheduled runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bake feed data into the static site
        run: node scripts/build-static.js

      # Persist the lightweight memory file so the time series survives between
      # runs. The "[skip ci]" tag stops this commit from re-triggering the
      # workflow (which would otherwise loop on every push).
      - name: Persist memory
        run: |
          git config user.name "aftermarket-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- data/memory.json; then
            git add data/memory.json
            git commit -m "chore: update memory snapshot [skip ci]"
            git push origin HEAD:main
          else
            echo "No memory changes to persist."
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
